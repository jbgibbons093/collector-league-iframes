<!DOCTYPE html>
<html lang="en">
<!--
  Collector League — Rip Night LINEUP BUILDER (Portals iframe)
  ---------------------------------------------------------------------------
  Five-slot salary-cap lineup UI (plan section 5.3). Bright Pokemon palette,
  ORIGINAL Collector League branding. Client-side salary check is for UX only —
  the BACKEND re-validates salary and slot rules and is authoritative.

  Options below are demo-seeded. In production they come from
  GET /v1/contests/:id/options (frozen draft options) and the lock POSTs to
  POST /v1/contests/:id/lineup/lock. On a successful lock we also advance the
  room's "20_lineup_locked" task so the 3D venue reacts.
-->
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Collector League — Build Your Lineup</title>
<script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
<style>
  :root{
    --cl-red:#E3350D; --cl-red-dk:#B5260A; --cl-blue:#3B9DF0; --cl-yellow:#FFCB05;
    --cl-green:#3DBE5A; --cl-purple:#A040A0; --cl-ink:#10162B; --cl-ink2:#1B2540; --cl-cream:#FFF7E6;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:transparent;font-family:'Trebuchet MS','Segoe UI',sans-serif;color:#fff;}
  .panel{position:fixed;inset:0;margin:auto;width:min(680px,96vw);max-height:96vh;overflow:auto;
    background:linear-gradient(180deg,var(--cl-ink),var(--cl-ink2));border:4px solid #fff;border-radius:22px;
    box-shadow:0 18px 50px rgba(0,0,0,.5);}
  header{display:flex;align-items:center;gap:12px;background:linear-gradient(90deg,var(--cl-red),var(--cl-red-dk));
    padding:14px 18px;border-radius:18px 18px 0 0;border-bottom:4px solid #fff;}
  .ball{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 50% 38%,#fff 0 32%,var(--cl-yellow) 33% 100%);
    border:3px solid #fff;box-shadow:0 3px 0 rgba(0,0,0,.2);flex:0 0 auto;}
  h1{font-size:18px;margin:0;letter-spacing:1px;font-weight:900;text-shadow:0 2px 0 rgba(0,0,0,.25);}
  h1 small{display:block;font-size:10px;letter-spacing:3px;opacity:.92;font-weight:700;}
  .lock-timer{margin-left:auto;background:rgba(0,0,0,.25);border-radius:11px;padding:5px 11px;font-weight:800;font-size:14px;}
  .body{padding:14px 18px 0;}
  .slot{margin:0 0 14px;}
  .slot h2{font-size:12px;letter-spacing:2px;color:var(--cl-yellow);margin:0 0 7px;text-transform:uppercase;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{cursor:pointer;border:2px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);
    border-radius:12px;padding:8px 12px;font-weight:700;font-size:13px;display:flex;gap:8px;align-items:center;
    transition:transform .12s,border-color .12s,background .12s;user-select:none;}
  .chip:hover{transform:translateY(-2px);}
  .chip .sal{font-size:11px;font-weight:900;background:rgba(0,0,0,.3);border-radius:8px;padding:1px 7px;color:var(--cl-yellow);}
  .chip.sel{background:var(--cl-green);border-color:#fff;color:#06250f;}
  .chip.sel .sal{background:rgba(0,0,0,.25);color:#fff;}
  .chip.disabled{opacity:.4;cursor:not-allowed;}
  footer{position:sticky;bottom:0;background:rgba(10,14,26,.96);border-top:4px solid #fff;
    padding:12px 18px;display:flex;align-items:center;gap:14px;border-radius:0 0 18px 18px;}
  .meter{flex:1 1 auto;}
  .meter .stats{display:flex;gap:16px;font-weight:800;font-size:13px;margin-bottom:6px;font-variant-numeric:tabular-nums;}
  .meter .stats b{color:var(--cl-yellow);}
  .bar{height:10px;border-radius:6px;background:rgba(255,255,255,.12);overflow:hidden;}
  .bar>div{height:100%;background:linear-gradient(90deg,var(--cl-green),var(--cl-yellow));transition:width .2s,background .2s;}
  .bar.over>div{background:linear-gradient(90deg,var(--cl-red),#ff8a5c);}
  .lockbtn{cursor:pointer;border:0;border-radius:14px;padding:13px 22px;font-weight:900;font-size:15px;letter-spacing:1px;
    color:#fff;background:linear-gradient(180deg,#9aa3bd,#6f7896);box-shadow:0 5px 0 rgba(0,0,0,.25);}
  .lockbtn.ready{background:linear-gradient(180deg,var(--cl-red),var(--cl-red-dk));cursor:pointer;}
  .lockbtn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.25);}
  .nopurchase{text-align:center;font-size:9px;letter-spacing:2px;color:#8b95b3;padding:6px 0 10px;}
  .locked-msg{display:none;text-align:center;padding:26px;}
  .locked-msg h2{color:var(--cl-green);font-size:24px;margin:0 0 8px;}
  .locked-msg p{color:#aeb7d2;font-size:13px;margin:4px 0;}
</style>
</head>
<body>
  <div class="panel" id="panel">
    <header>
      <div class="ball"></div>
      <h1>BUILD YOUR LINEUP<small>RIP NIGHT &middot; COLLECTOR LEAGUE</small></h1>
      <div class="lock-timer" id="timer">LOCK 05:00</div>
    </header>
    <div class="body" id="slots"></div>
    <footer>
      <div class="meter">
        <div class="stats">
          <span><b id="filled">0</b>/5 slots</span>
          <span><b id="salary">0</b>/<span id="cap">100</span> salary</span>
          <span>Projected <b id="proj">0</b></span>
        </div>
        <div class="bar" id="bar"><div style="width:0%"></div></div>
      </div>
      <button class="lockbtn" id="lock" disabled>LOCK LINEUP</button>
    </footer>
    <div class="nopurchase">FREE TO PLAY &mdash; NO PURCHASE NECESSARY</div>
    <div class="locked-msg" id="lockedMsg">
      <h2>LINEUP LOCKED</h2>
      <p id="lockedPicks"></p>
      <p>Salary <b id="lockedSalary"></b>/100 &middot; watch the reveals on the main stage.</p>
    </div>
  </div>

<script>
(function(){
  "use strict";
  var CAP = 100;
  // Demo option pool — production pulls frozen options from the backend.
  var SLOTS = [
    { key:'MACHINE', name:'Machine', options:[
      {id:'m_elite',label:'Elite',sal:24},{id:'m_legend',label:'Legendary',sal:28},{id:'m_grail',label:'Grail',sal:19} ]},
    { key:'RARITY', name:'Rarity', options:[
      {id:'r_com',label:'Common',sal:28},{id:'r_unc',label:'Uncommon',sal:23},{id:'r_rare',label:'Rare',sal:20},{id:'r_epic',label:'Epic',sal:10} ]},
    { key:'VALUE', name:'Insured Value', options:[
      {id:'v_100',label:'<$100',sal:26},{id:'v_249',label:'$100-249',sal:23},{id:'v_499',label:'$250-499',sal:20},{id:'v_999',label:'$500-999',sal:17},{id:'v_1k',label:'$1000+',sal:11} ]},
    { key:'GRADE', name:'Grade', options:[
      {id:'g_gem',label:'Gem 10',sal:30},{id:'g_m9',label:'Mint 9',sal:19},{id:'g_8',label:'8 or lower',sal:12},{id:'g_oth',label:'Other',sal:10} ]},
    { key:'ERA', name:'Era', options:[
      {id:'e_vint',label:'<=2005',sal:12},{id:'e_mid',label:'2006-15',sal:17},{id:'e_mod',label:'2016-21',sal:23},{id:'e_cur',label:'2022+',sal:28} ]}
  ];
  // rough demo projection weights per option (production = simulator projection)
  var PROJ = { r_epic:120, r_rare:70, r_unc:35, r_com:18, g_gem:60, v_1k:55, v_999:48, m_grail:40, e_vint:30 };

  var picks = {};                 // slotKey -> option
  var slotsEl = document.getElementById('slots');
  var filledEl = document.getElementById('filled');
  var salaryEl = document.getElementById('salary');
  var projEl = document.getElementById('proj');
  var barEl = document.getElementById('bar');
  var lockBtn = document.getElementById('lock');
  document.getElementById('cap').textContent = CAP;

  SLOTS.forEach(function(slot){
    var wrap = document.createElement('div'); wrap.className='slot';
    var h = document.createElement('h2'); h.textContent = slot.name; wrap.appendChild(h);
    var chips = document.createElement('div'); chips.className='chips';
    slot.options.forEach(function(opt){
      var c = document.createElement('div'); c.className='chip'; c.dataset.slot=slot.key; c.dataset.id=opt.id; c.dataset.sal=opt.sal;
      c.innerHTML = opt.label + '<span class="sal">'+opt.sal+'</span>';
      c.onclick = function(){ select(slot.key, opt, c, chips); };
      chips.appendChild(c);
    });
    wrap.appendChild(chips); slotsEl.appendChild(wrap);
  });

  function select(slotKey, opt, chip, chips){
    chips.querySelectorAll('.chip').forEach(function(x){ x.classList.remove('sel'); });
    chip.classList.add('sel');
    picks[slotKey] = opt;
    refresh();
  }

  function refresh(){
    var keys = Object.keys(picks);
    var sal = keys.reduce(function(s,k){ return s + picks[k].sal; }, 0);
    var proj = keys.reduce(function(s,k){ return s + (PROJ[picks[k].id]||10); }, 0);
    filledEl.textContent = keys.length;
    salaryEl.textContent = sal;
    projEl.textContent = proj;
    var pct = Math.min(100, Math.round(sal/CAP*100));
    barEl.firstElementChild.style.width = pct + '%';
    barEl.classList.toggle('over', sal > CAP);
    var ready = keys.length === 5 && sal <= CAP;
    lockBtn.disabled = !ready;
    lockBtn.classList.toggle('ready', ready);
  }

  lockBtn.onclick = function(){
    if (lockBtn.disabled) return;
    var sal = Object.keys(picks).reduce(function(s,k){ return s+picks[k].sal; },0);
    // Tell the room the lineup is locked (3D venue reacts). Backend lock is separate + authoritative.
    if (window.PortalsSdk && PortalsSdk.sendMessageToUnity){
      try {
        PortalsSdk.sendMessageToUnity(JSON.stringify({
          TaskName:'20_lineup_locked', TaskTargetState:'SetNotActiveToCompleted' }));
      } catch(e){}
    }
    document.getElementById('lockedPicks').textContent =
      SLOTS.map(function(s){ return picks[s.key].label; }).join('  /  ');
    document.getElementById('lockedSalary').textContent = sal;
    document.querySelector('.body').style.display='none';
    document.querySelector('footer').style.display='none';
    document.getElementById('lockedMsg').style.display='block';
  };

  // Simple visual lock countdown (display only; server time is authoritative).
  var secs = 300;
  setInterval(function(){
    if (secs<=0) return;
    secs--; var m=Math.floor(secs/60), s=secs%60;
    document.getElementById('timer').textContent = 'LOCK ' + (m<10?'0':'')+m + ':' + (s<10?'0':'')+s;
  }, 1000);
})();
</script>
</body>
</html>
