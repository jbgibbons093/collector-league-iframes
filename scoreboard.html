<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rip Night — Live Scoreboard</title>
<script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
<script src="slate-data.js"></script>
<script src="cl-kit.js"></script>
<style>
  body{padding:0}
  .wrap{width:344px;margin:0 auto}
  .cl-panel{border-radius:18px}
  .help{background:#30D0E0;color:#06323a;font-weight:800;font-size:11px;text-align:center;padding:5px;letter-spacing:.3px}
  .reveal{display:flex;gap:10px;padding:11px 11px 4px}
  .reveal .card{width:118px;flex:none}
  .reveal .info{flex:1;min-width:0}
  .rl{font-family:'Baloo 2';font-weight:800;font-size:11px;color:#E3350D;letter-spacing:1px}
  .rn{font-family:'Baloo 2';font-weight:800;font-size:19px;line-height:1.05;margin:1px 0 7px;color:#241a22}
  .attrs{display:flex;flex-direction:column;gap:4px}
  .attr{display:flex;justify-content:space-between;font-size:12px;background:#fff;border:1px solid #f0dde3;border-radius:8px;padding:4px 8px}
  .attr b{font-weight:800;color:#241a22}.attr span{color:#8a7f86;font-weight:700}
  .you{margin:8px 11px 0;background:#fff7ef;border:2px solid #ffd9a0;border-radius:12px;padding:8px 10px;display:none}
  .you.on{display:block}
  .you .yh{font-family:'Baloo 2';font-weight:800;font-size:13px;color:#b8620a}
  .you .yb{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
  .you .sb{font-size:11px;font-weight:800;border-radius:7px;padding:2px 7px;background:#3DBE5A;color:#fff}
  .you .sb.miss{background:#e7dde2;color:#9a8e95}
  .bh{font-family:'Baloo 2';font-weight:800;font-size:12px;letter-spacing:1px;color:#8a7f86;padding:11px 13px 4px}
  .board{padding:0 9px 11px}
  .row{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:10px;margin-top:4px;background:#fff;border:1px solid #f3e6eb}
  .row.me{background:#fff4f2;border-color:#ffc2b6}
  .row .rk{width:22px;height:22px;border-radius:50%;background:#efe7eb;color:#7a6f76;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex:none}
  .row.t1 .rk{background:#FFCB05;color:#5a4500}.row.t2 .rk{background:#cdd3da;color:#3a4350}.row.t3 .rk{background:#e6a062;color:#fff}
  .row .nm{flex:1;font-weight:700;font-size:14px;color:#2a1f28;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .sc{font-weight:800;font-size:16px;font-variant-numeric:tabular-nums;color:#E3350D}
  .pulse{animation:pl .6s}@keyframes pl{0%{transform:scale(1)}40%{transform:scale(1.04)}100%{transform:scale(1)}}
</style>
</head>
<body>
<div class="wrap">
<div class="cl-panel">
  <div class="cl-bar"><span class="t">RIP NIGHT</span><span class="s" id="pack">Waiting to start</span></div>
  <div class="help">Score when a revealed card matches your lineup picks</div>
  <div class="reveal">
    <div class="card" id="card"></div>
    <div class="info">
      <div class="rl">JUST REVEALED</div>
      <div class="rn" id="rname">&mdash;</div>
      <div class="attrs" id="attrs"></div>
    </div>
  </div>
  <div class="you" id="you"><div class="yh" id="yh">YOUR SCORE</div><div class="yb" id="yb"></div></div>
  <div class="bh">LIVE STANDINGS</div>
  <div class="board" id="board"></div>
</div>
</div>
<script>
(function(){
  var SLATE = window.CL_SLATE || [];
  var packEl=document.getElementById('pack'), cardEl=document.getElementById('card'),
      rnEl=document.getElementById('rname'), attrEl=document.getElementById('attrs'),
      boardEl=document.getElementById('board'), youEl=document.getElementById('you'), ybEl=document.getElementById('yb'), yhEl=document.getElementById('yh');
  var lastScore={};

  function attr(k,v){ return '<div class="attr"><span>'+k+'</span><b>'+v+'</b></div>'; }
  function renderReveal(i){
    var c=SLATE[i];
    if(!c){ cardEl.innerHTML=CL.card(SLATE[0]||{},{facedown:true}); rnEl.textContent='Waiting for the next pack'; attrEl.innerHTML=''; return; }
    cardEl.innerHTML=CL.card(c);
    rnEl.textContent=c.name;
    attrEl.innerHTML=attr('Machine',c.machine)+attr('Rarity',c.rarity)+attr('Grade',c.grade+' &middot; '+c.gradeBand)+attr('Value',c.valueLabel)+attr('Era',c.era+' &middot; '+c.year);
  }
  function renderBoard(rows){
    boardEl.innerHTML = rows.map(function(r,i){
      var t=i<3?(' t'+(i+1)):'', me=r.me?' me':'';
      var pulse=(lastScore[r.name]!==undefined && lastScore[r.name]!==r.score)?' pulse':''; lastScore[r.name]=r.score;
      return '<div class="row'+t+me+pulse+'"><div class="rk">'+(i+1)+'</div><div class="nm">'+r.name+'</div><div class="sc">'+r.score+'</div></div>';
    }).join('');
  }
  function parseStandings(p){ return p.split('|').map(function(x){var a=x.split('~');return{name:a[0]||'?',score:Number(a[1])||0};}); }
  function renderYou(payload){
    var parts=payload.split('|').map(function(x){var a=x.split('~');return{k:a[0],v:Number(a[1])||0};});
    var total=parts.reduce(function(s,p){return s+p.v;},0);
    yhEl.textContent='YOUR SCORE  +'+total;
    ybEl.innerHTML=parts.map(function(p){return '<span class="sb'+(p.v>0?'':' miss')+'">'+p.k+' +'+p.v+'</span>';}).join('');
    youEl.classList.add('on');
  }
  function handle(s){
    if(s.indexOf('reveal_')===0) renderReveal(Number(s.substring(7))||0);
    else if(s.indexOf('pack_')===0){ var p=s.substring(5).split('_'); packEl.textContent='Pack '+p[0]+' of '+(p[1]||'?'); }
    else if(s.indexOf('standings_')===0) renderBoard(parseStandings(s.substring(10)));
    else if(s.indexOf('slots_')===0) renderYou(s.substring(6));
  }

  if(window.PortalsSdk && PortalsSdk.setMessageListener){
    PortalsSdk.setMessageListener(function(m){ var s=(typeof m==='string')?m:JSON.stringify(m); try{var j=JSON.parse(m); if(typeof j==='string')s=j;}catch(e){} handle(s); });
    try{ PortalsSdk.sendMessageToUnity(JSON.stringify({TaskName:'scoreboard_ready',TaskTargetState:'SetNotActiveToCompleted'})); }catch(e){}
  }
  // standalone seed so the file renders on its own (and in-room until the host pushes live state)
  renderReveal(SLATE.length-2);
  handle('pack_12_12');
  handle('standings_Jason~2075|Atlas~1371|Echo~1223|Kira~734|Nova~212');
})();
</script>
</body>
</html>
